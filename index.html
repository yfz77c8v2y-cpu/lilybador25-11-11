<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  text-align:center;
  font-family:'Quicksand',sans-serif;
  background:#ffe6f2;
  overflow-y:auto;
  overflow-x:hidden;
}

/* -------- Math Game -------- */
#mathBox{ margin-top:30px; }

#question{
  font-size:28px;
  font-weight:700;
  color:#ff1493;
}

#answer{
  padding:10px;
  font-size:18px;
  border-radius:10px;
  border:1px solid #ff4da6;
  margin-top:10px;
}

#checkBtn{
  margin-top:10px;
  padding:10px 18px;
  border:none;
  border-radius:15px;
  background:#ff4da6;
  color:white;
  cursor:pointer;
}

#msg{
  margin-top:10px;
  font-size:18px;
  font-weight:600;
}

/* -------- Hearts Game -------- */
#topText{
  font-size:32px;
  font-weight:700;
  color:#ff1493;
  margin-top:20px;
  display:none;
}

#score{ font-size:18px; display:none; }

.heart{
  font-size:42px;
  cursor:pointer;
  display:inline-block;
  margin:10px;
}

/* -------- Message -------- */
#messageBox{
  display:none;
  margin:30px auto;
  padding:20px;
  width:85%;
  max-width:320px;
  background:white;
  border-radius:20px;
}

#text{
  font-size:26px;
  color:#ff1493;
  line-height:1.7;
  white-space:pre-line;
}

.win-image{
  width:220px;
  border-radius:15px;
  margin-top:15px;
}

/* -------- Overlay -------- */
#endOverlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(255,230,242,0.92);
  z-index:999;
  justify-content:center;
  align-items:center;
}

.end-content{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}

.end-img1{ width:220px; border-radius:15px; }
.end-img2{ width:160px; border-radius:15px; }

.floating-text{
  font-size:28px;
  font-weight:700;
  color:#ff1493;
  animation: moveText 1.5s infinite alternate;
}

@keyframes moveText{
  0%{transform:translateY(15px);opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-15px);opacity:1;}
}

/* -------- Hearts -------- */
.float-heart{
  position:fixed;
  font-size:22px;
  animation:floatUp 5s linear forwards;
}

@keyframes floatUp{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-800px);opacity:0;}
}

/* -------- Confetti -------- */
.confetti{
  position:fixed;
  font-size:18px;
  animation: fall 3s linear forwards;
}

@keyframes fall{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(800px);opacity:0;}
}

/* pop animation */
.pop-message{
  animation: popIn 0.5s ease-out;
}

@keyframes popIn{
  0%{transform:scale(0.7);opacity:0;}
  60%{transform:scale(1.05);opacity:1;}
  100%{transform:scale(1);}
}

</style>
</head>

<body>

<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<div id="mathBox">
  <div id="question"></div>
  <input id="answer" type="number" placeholder="Your answer">
  <br>
  <button id="checkBtn">Check</button>
  <div id="msg"></div>
</div>

<div id="topText">PRESS TO WIN</div>
<p id="score">0 / 6</p>
<div id="game"></div>

<div id="messageBox">
  <div id="text"></div>
  <img src="https://i.imgur.com/eOEcQSV.jpeg" class="win-image">
</div>

<div id="endOverlay">
  <div class="end-content">
    <img src="https://i.imgur.com/ScJQhwO.jpg" class="end-img1">

    <div class="floating-text">
      LILLYYYYYY LOVESSSSSSS BADDOORRRRRRRRR
    </div>

    <img src="https://i.imgur.com/cqiXrWK.jpg" class="end-img2">
  </div>
</div>

<script>

/* -------- MATH GAME -------- */
let step = 0;

let questions = [
  {q:"2 + 5 = ?", a:7},
  {q:"7 + 10 - 3 + 16 - 5 = ?", a:25}
];

function loadQ(){
  document.getElementById("question").innerText = questions[step].q;
  document.getElementById("answer").value = "";
  document.getElementById("msg").innerText = "";
}
loadQ();

document.getElementById("checkBtn").onclick = function(){
  let val = Number(document.getElementById("answer").value);

  if(val === questions[step].a){
    document.getElementById("correctSound").play();
    document.getElementById("msg").innerText = "✔️ Correct!";
    burstHearts();

    step++;

    setTimeout(()=>{
      if(step < questions.length){
        loadQ();
      } else {
        document.getElementById("mathBox").style.display="none";
        startHearts();
      }
    },800);

  } else {
    document.getElementById("wrongSound").play();
    document.getElementById("msg").innerText = "❌ Try again";
  }
};

function burstHearts(){
  for(let i=0;i<12;i++){
    let h=document.createElement("div");
    h.innerHTML="🩵";
    h.style.position="fixed";
    h.style.left=Math.random()*100+"vw";
    h.style.top="50%";
    h.style.animation="floatUp 4.5s ease forwards";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),2500);
  }
}

/* -------- HEART GAME -------- */

let score=0;
let target=6;

function startHearts(){

document.getElementById("topText").style.display="block";
document.getElementById("score").style.display="block";

let game=document.getElementById("game");
let scoreText=document.getElementById("score");

function createHeart(){
  let heart=document.createElement("div");
  heart.className="heart";
  let arr=["🩷","🩵"];
  heart.innerHTML=arr[Math.floor(Math.random()*arr.length)];

  heart.onclick=function(){
    score++;
    scoreText.innerText=score+" / "+target;
    heart.remove();

    let float=document.createElement("div");
    float.className="float-heart";
    float.innerHTML=heart.innerHTML;
    float.style.left=Math.random()*100+"vw";
    document.body.appendChild(float);

    setTimeout(()=>float.remove(),5000);

    if(score===target){
      showMessage();
    }
  };

  game.appendChild(heart);
}

for(let i=0;i<target;i++) createHeart();

}

/* -------- FINAL MESSAGE -------- */

function showMessage(){

document.getElementById("game").style.display="none";
document.getElementById("topText").style.display="none";
document.getElementById("score").style.display="none";

document.getElementById("messageBox").style.display="block";

let box=document.getElementById("text");

box.classList.add("pop-message");

box.innerText =
`GREAT JOB MY SWEETIE BOY
I LOVE YOU 😽💕💕 25,0000000000000♾️!

I'm proud of you even for the small things

You mean more to me than anything`;

/* confetti */
for(let i=0;i<40;i++){
  let c=document.createElement("div");
  c.className="confetti";
  c.innerHTML=Math.random()>0.5?"🩷":"🩵";
  c.style.left=Math.random()*100+"vw";
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),3000);
}

/*  التعديل : 5 ثواني */
setTimeout(()=>{
  document.getElementById("endOverlay").style.display="flex";
},3000);

}

</script>

</body>
</html>
