<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  text-align:center;
  font-family:'Quicksand',sans-serif;
  background:#ffe6f2;
  overflow-y:auto;
  overflow-x:hidden;
}

/* -------- Math -------- */
#mathBox{ margin-top:30px; }

#question{
  font-size:28px;
  font-weight:700;
  color:#ff1493;
}

#answer{
  padding:10px;
  font-size:18px;
  border-radius:10px;
}

#checkBtn{
  margin-top:10px;
  padding:10px 18px;
  border:none;
  border-radius:15px;
  background:#ff4da6;
  color:white;
}

/* -------- Hearts -------- */
#topText{
  font-size:32px;
  font-weight:700;
  color:#ff1493;
  display:none;
}

#score{ display:none; }

.heart{
  font-size:42px;
  cursor:pointer;
  margin:10px;
}

/* -------- MESSAGE -------- */
#messageBox{
  display:none;
  margin:30px auto;
  padding:20px;
  width:85%;
  max-width:320px;
  background:white;
  border-radius:20px;
}

#text{
  font-size:24px;
  color:#ff1493;
  line-height:1.7;
}

/* -------- POPUP -------- */
#imgOverlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(255,230,242,0.92);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-content{
  text-align:center;
  animation:fadeIn 1.5s ease;
}

.popup-img{
  width:70%;
  max-width:300px;
  border-radius:20px;
}

.popup-small{
  width:140px;
  margin-top:10px;
  border-radius:15px;
  opacity:0;
  animation:fadeIn 2s forwards;
}

/* الكلام تحت الصور */
.popup-text{
  margin-top:15px;
  font-size:22px;
  font-weight:700;
  color:#ff1493;
}

/* -------- HORIZONTAL HEARTS -------- */
.float-heart{
  position:fixed;
  font-size:22px;
  animation:moveSide 2s linear forwards;
}

@keyframes moveSide{
  0%{transform:translateX(0); opacity:1;}
  100%{transform:translateX(120vw); opacity:0;}
}

/* -------- CONFETTI -------- */
.confetti{
  position:fixed;
  width:10px;
  height:10px;
  top:0;
  animation:fall 3s linear forwards;
  z-index:9999;
}

@keyframes fall{
  0%{transform:translateY(0) rotate(0deg); opacity:1;}
  100%{transform:translateY(100vh) rotate(360deg); opacity:0;}
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<!-- 🧠 Math -->
<div id="mathBox">
  <div id="question"></div>
  <input id="answer" type="number">
  <button id="checkBtn">Check</button>
</div>

<!-- ❤️ Hearts -->
<div id="topText">PRESS TO WIN</div>
<p id="score">0 / 6</p>
<div id="game"></div>

<!-- 💌 MESSAGE -->
<div id="messageBox">
  <div id="text"></div>
  <img src="https://i.imgur.com/eOEcQSV.jpeg" width="200">
</div>

<!-- 🖼️ POPUP -->
<div id="imgOverlay">
  <div class="popup-content">

    <img src="https://i.imgur.com/ScJQhwO.jpg" class="popup-img">

    <img src="https://i.imgur.com/cqiXrWK.jpg" class="popup-small">

    <div class="popup-text">
      LILLYYYYYY LOVESSSSSSS BADDOORRRRRRRRR
    </div>

  </div>
</div>

<script>

/* -------- Math -------- */
let step=0;

let q=[
 {q:"2 + 5 = ?", a:7},
 {q:"7 + 10 - 3 + 16 - 5 = ?", a:25}
];

document.getElementById("question").innerText=q[0].q;

document.getElementById("checkBtn").onclick=function(){

let val=Number(document.getElementById("answer").value);

if(val===q[step].a){

step++;
burst();

if(step<q.length){
document.getElementById("question").innerText=q[step].q;
document.getElementById("answer").value="";
}
else{
startHearts();
document.getElementById("mathBox").style.display="none";
finalConfetti();
}

}
};

/* 💥 burst */
function burst(){
for(let i=0;i<8;i++){
let h=document.createElement("div");
h.className="float-heart";
h.innerHTML=["🩵","🩷"][Math.floor(Math.random()*2)];
h.style.top=Math.random()*100+"vh";
document.body.appendChild(h);
setTimeout(()=>h.remove(),2000);
}
}

/* ❤️ hearts horizontal */
let score=0;
let target=6;

function startHearts(){

document.getElementById("topText").style.display="block";
document.getElementById("score").style.display="block";

let game=document.getElementById("game");
let scoreText=document.getElementById("score");

for(let i=0;i<target;i++){

let h=document.createElement("div");
h.className="heart";
h.innerHTML=["🩵","🩷"][Math.floor(Math.random()*2)];

h.onclick=function(){

score++;
scoreText.innerText=score+" / "+target;

/* horizontal move */
let fly=document.createElement("div");
fly.className="float-heart";
fly.innerHTML=h.innerHTML;
fly.style.top=Math.random()*100+"vh";
document.body.appendChild(fly);
setTimeout(()=>fly.remove(),2000);

h.remove();

if(score===target){
showMessage();
}
};

game.appendChild(h);
}
}

/* 💌 message */
function showMessage(){

document.getElementById("game").style.display="none";
document.getElementById("topText").style.display="none";
document.getElementById("score").style.display="none";

document.getElementById("messageBox").style.display="block";

document.getElementById("text").innerText=
`🩷🩷 GREAT JOB MY SWEETIE BOY
I LOVE YOU 25,0000000000000♾️!

I'm proud of you
You mean everything`;

setTimeout(()=>{

document.getElementById("imgOverlay").style.display="flex";

finalConfetti();

},4000);

}

/* 🎉 FINAL CONFETTI */
function finalConfetti(){
let colors=["#ff69b4","#9ad7ff"];

for(let i=0;i<90;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=colors[Math.floor(Math.random()*2)];
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

</script>

</body>
</html>
