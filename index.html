<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  text-align:center;
  font-family:'Quicksand',sans-serif;
  background:#ffe6f2;
  overflow-y:auto;
  overflow-x:hidden;
}

/* -------- Math Game -------- */
#mathBox{
  margin-top:30px;
}

#question{
  font-size:28px;
  font-weight:700;
  color:#ff1493;
}

#answer{
  padding:10px;
  font-size:18px;
  border-radius:10px;
  border:1px solid #ff4da6;
  margin-top:10px;
}

#checkBtn{
  margin-top:10px;
  padding:10px 18px;
  border:none;
  border-radius:15px;
  background:#ff4da6;
  color:white;
  cursor:pointer;
}

#msg{
  margin-top:10px;
  font-size:18px;
  font-weight:600;
}

/* -------- Hearts Game -------- */
#topText{
  font-size:32px;
  font-weight:700;
  color:#ff1493;
  margin-top:20px;
  display:none;
}

#score{
  font-size:18px;
  display:none;
}

.heart{
  font-size:42px;
  cursor:pointer;
  display:inline-block;
  margin:10px;
}

/* -------- Message -------- */
#messageBox{
  display:none;
  margin:30px auto;
  padding:20px;
  width:85%;
  max-width:320px;
  background:white;
  border-radius:20px;
}

#text{
  font-size:26px;
  color:#ff1493;
  line-height:1.7;
  white-space:pre-line;
}

.win-image{
  width:220px;
  border-radius:15px;
  margin-top:15px;
}

/* ⭐ الصورة الثالثة (آخر شيء) */
.small-image{
  width:160px;
  border-radius:15px;
  margin-top:15px;

  opacity:0;
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* -------- Popup Image -------- */
#imgOverlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(255, 230, 242, 0.92);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-img{
  width:70%;
  max-width:300px;
  border-radius:20px;
}

/* -------- Floating hearts -------- */
.float-heart{
  position:fixed;
  font-size:22px;
  animation:floatUp 3s linear forwards;
}

@keyframes floatUp{
  from{transform:translateY(0); opacity:1;}
  to{transform:translateY(-800px); opacity:0;}
}

/* -------- Floating text -------- */
@keyframes moveText {
  0% { transform: translateY(20px); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-20px); opacity: 1; }
}

.floating-text {
  position: fixed;
  bottom: 20%;
  width: 100%;
  text-align: center;
  font-size: 28px;
  font-weight: 700;
  color: #ff1493;
  animation: moveText 1.5s infinite alternate;
  z-index: 1000;
}

</style>
</head>

<body>

<!-- 🧠 Math Game -->
<div id="mathBox">
  <div id="question"></div>
  <input id="answer" type="number" placeholder="Your answer">
  <br>
  <button id="checkBtn">Check</button>
  <div id="msg"></div>
</div>

<!-- ❤️ Hearts Game -->
<div id="topText">PRESS TO WIN</div>
<p id="score">0 / 6</p>
<div id="game"></div>

<!-- 💌 Message -->
<div id="messageBox">

  <div id="text"></div>

  <img src="https://i.imgur.com/eOEcQSV.jpeg" class="win-image">

  <!-- ⭐ الصورة الثالثة (آخر شيء) -->
  <img id="finalImg" src="https://i.imgur.com/cqiXrWK.jpg" class="small-image" style="display:none;">

</div>

<!-- 🖼️ Popup Image -->
<div id="imgOverlay">
  <img src="https://i.imgur.com/ScJQhwO.jpg" class="popup-img">
</div>

<script>

/* -------- MATH GAME -------- */
let step = 0;

let questions = [
  {q:"2 + 5 = ?", a:7},
  {q:"7 + 10 - 3 + 16 - 5 = ?", a:25}
];

document.getElementById("question").innerText = questions[0].q;

document.getElementById("checkBtn").onclick = function(){

let val = Number(document.getElementById("answer").value);

if(val === questions[step].a){

  step++;
  document.getElementById("msg").innerText = "✔️ correct";
  burstHearts();

  if(step < questions.length){
    document.getElementById("question").innerText = questions[step].q;
    document.getElementById("answer").value = "";
  } else {
    startHearts();
    document.getElementById("mathBox").style.display="none";
  }

}

};

/* 🎉 احتفال */
function burstHearts(){
  for(let i=0;i<12;i++){
    let h=document.createElement("div");
    h.className="float-heart";
    h.innerHTML="💗";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),2000);
  }
}

/* -------- HEART GAME -------- */
let score=0;
let target=6;

function startHearts(){

document.getElementById("topText").style.display="block";
document.getElementById("score").style.display="block";

let game=document.getElementById("game");
let scoreText=document.getElementById("score");

for(let i=0;i<target;i++){

let h=document.createElement("div");
h.className="heart";
h.innerHTML="🩷";

h.onclick=function(){

score++;
scoreText.innerText=score+" / "+target;

let fly=document.createElement("div");
fly.className="float-heart";
fly.innerHTML="🩷";
fly.style.left=Math.random()*100+"vw";
document.body.appendChild(fly);
setTimeout(()=>fly.remove(),2000);

h.remove();

if(score===target){
  showMessage();
}

};

game.appendChild(h);

}

}

/* -------- MESSAGE -------- */
function showMessage(){

document.getElementById("game").style.display="none";
document.getElementById("topText").style.display="none";
document.getElementById("score").style.display="none";

document.getElementById("messageBox").style.display="block";

document.getElementById("text").innerText =
`GREAT JOB MY SWEETIE BOY😽💕💕
I LOVE YOU 25,0000000000000♾️!

I'm proud of you even for the small things

You mean more to me than anything`;

/* popup + النص */
setTimeout(()=>{

  document.getElementById("imgOverlay").style.display="flex";

  let txt=document.createElement("div");
  txt.className="floating-text";
  txt.innerText="LILLYYYYYY LOVESSSSSSS BADDOORRRRRRRRR";

  document.body.appendChild(txt);

  /* ⭐ الصورة الثالثة تظهر آخر شيء */
  setTimeout(()=>{
    document.getElementById("finalImg").style.display="block";
  },1000);

},4000);

}

</script>

</body>
</html>
