<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  text-align:center;
  font-family:'Quicksand',sans-serif;
  background:#ffe6f2;
  overflow-y:auto;
}

/* -------- MATH GAME -------- */
#mathBox{ margin-top:40px; }

#question{
  font-size:28px;
  font-weight:700;
  color:#ff1493;
}

#answer{
  padding:10px;
  font-size:18px;
  border-radius:10px;
  border:1px solid #ff4da6;
  margin-top:10px;
}

#checkBtn{
  margin-top:10px;
  padding:10px 18px;
  border:none;
  border-radius:15px;
  background:#ff4da6;
  color:white;
}

/* -------- HEART GAME -------- */
#topText{
  font-size:32px;
  font-weight:700;
  color:#ff1493;
  display:none;
}

#score{
  display:none;
}

.heart{
  font-size:42px;
  cursor:pointer;
  margin:10px;
}

/* -------- MESSAGE -------- */
#messageBox{
  display:none;
  margin:30px auto;
  padding:20px;
  width:85%;
  max-width:320px;
  background:white;
  border-radius:20px;
}

/* الرسالة */
#text{
  font-size:24px;
  color:#ff1493;
  line-height:1.7;
  white-space:pre-line;
}

/* الصور */
.win-image{
  width:220px;
  border-radius:15px;
  margin-top:15px;
}

/* ⭐ الصورة الثالثة (تحت الكلام + سكروول طبيعي) */
.small-image{
  width:160px;
  border-radius:15px;
  margin-top:15px;
  opacity:0;
  animation: fadeIn 2s forwards;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* -------- POPUP -------- */
#imgOverlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(255,230,242,0.92);
  justify-content:center;
  align-items:center;
}

.popup-img{
  width:70%;
  border-radius:20px;
}

/* -------- FLOAT TEXT -------- */
.floating-text{
  position:fixed;
  bottom:20%;
  width:100%;
  text-align:center;
  font-size:26px;
  font-weight:700;
  color:#ff1493;
  animation: move 1.5s infinite alternate;
}

@keyframes move{
  0%{transform:translateY(20px); opacity:0;}
  100%{transform:translateY(-20px); opacity:1;}
}

/* 💗 قلوب تتطاير */
.float-heart{
  position:fixed;
  font-size:22px;
  animation: fly 2s linear forwards;
}

@keyframes fly{
  from{transform:translateY(0); opacity:1;}
  to{transform:translateY(-700px); opacity:0;}
}

</style>
</head>

<body>

<!-- 🧠 GAME -->
<div id="mathBox">
  <div id="question"></div>
  <input id="answer" type="number">
  <br>
  <button id="checkBtn">Check</button>
</div>

<!-- ❤️ HEART GAME -->
<div id="topText">PRESS TO WIN</div>
<p id="score">0 / 6</p>
<div id="game"></div>

<!-- 💌 MESSAGE -->
<div id="messageBox">

  <div id="text">
🩷🩷 GREAT JOB MY SWEETIE BOY
I LOVE YOU 25,0000000000000♾️!

I'm proud of you, even for the small things

You mean more to me than anything.
  </div>

  <img src="https://i.imgur.com/eOEcQSV.jpeg" class="win-image">

  <!-- الصورة الثالثة (تحت الكلام) -->
  <img src="https://i.imgur.com/cqiXrWK.jpg" class="small-image">

</div>

<!-- POPUP -->
<div id="imgOverlay">
  <img src="https://i.imgur.com/ScJQhwO.jpg" class="popup-img">
</div>

<script>

/* 🧠 math */
let step=0;
let q=[
 {q:"2 + 5 = ?",a:7},
 {q:"7 + 10 - 3 + 16 - 5 = ?",a:25}
];

document.getElementById("question").innerText=q[0].q;

document.getElementById("checkBtn").onclick=function(){

let val=Number(document.getElementById("answer").value);

if(val===q[step].a){

  step++;

  burst(); // 🎉 احتفال عند كل صح

  if(step<q.length){
    document.getElementById("question").innerText=q[step].q;
    document.getElementById("answer").value="";
  }else{
    startHearts();
    document.getElementById("mathBox").style.display="none";
  }

}

};

/* 🎉 احتفال */
function burst(){
  for(let i=0;i<12;i++){
    let h=document.createElement("div");
    h.className="float-heart";
    h.innerHTML="💗";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),2000);
  }
}

/* ❤️ heart game */
let score=0;
let target=6;

function startHearts(){

document.getElementById("topText").style.display="block";
document.getElementById("score").style.display="block";

let game=document.getElementById("game");
let scoreText=document.getElementById("score");

for(let i=0;i<target;i++){

let h=document.createElement("div");
h.className="heart";
h.innerHTML="🩷";

h.onclick=function(){

score++;
scoreText.innerText=score+" / "+target;

/* 💗 تطاير عند الضغط */
let fly=document.createElement("div");
fly.className="float-heart";
fly.innerHTML="🩷";
fly.style.left=Math.random()*100+"vw";
document.body.appendChild(fly);
setTimeout(()=>fly.remove(),2000);

h.remove();

if(score===target){
  showMessage();
}

};

game.appendChild(h);

}

}

/* 💌 message */
function showMessage(){

document.getElementById("game").style.display="none";
document.getElementById("topText").style.display="none";
document.getElementById("score").style.display="none";

document.getElementById("messageBox").style.display="block";

setTimeout(()=>{

  document.getElementById("imgOverlay").style.display="flex";

  let txt=document.createElement("div");
  txt.className="floating-text";
  txt.innerText="LILLYYYYYY LOVESSSSSSS BADDOORRRRRRRRR";

  document.body.appendChild(txt);

},4000);

}

</script>

</body>
</html>
