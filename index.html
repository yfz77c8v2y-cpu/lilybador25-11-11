
вҖҸ<!DOCTYPE html>
вҖҸ<html>
вҖҸ<head>
вҖҸ<meta name="viewport" content="width=device-width, initial-scale=1.0">

вҖҸ<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

вҖҸ<style>
вҖҸbody{
вҖҸ  text-align:center;
вҖҸ  font-family:'Quicksand',sans-serif;

вҖҸ#mathBox{

}

вҖҸ#question{
вҖҸ  font-size:28px;

}

вҖҸ#messageBox{
вҖҸ  display:none;
вҖҸ  margin:30px auto;

}

/* Ш§Щ„ШөЩҲШұШ© Ш§Щ„ШЈЩҲЩ„Щү */
вҖҸ.win-image{

}

вҖҸ/* -------- Popup image -------- */
вҖҸ#imgOverlay{
вҖҸ  display:none;
вҖҸ  position:fixed;
вҖҸ  top:0;
вҖҸ  left:0;
вҖҸ  width:100%;
вҖҸ  height:100%;
вҖҸ  background:rgba(255, 230, 242, 0.92);
вҖҸ  justify-content:center;
вҖҸ  align-items:center;
вҖҸ  z-index:999;
}

вҖҸ.popup-img{
вҖҸ  width:70%;
вҖҸ  max-width:300px;
вҖҸ  border-radius:20px;

}

вҖҸ@keyframes dropIn{
вҖҸ  from{
вҖҸ    transform: translateY(-40px) scale(0.9);
вҖҸ    opacity:0;
  }
вҖҸ  to{
вҖҸ    transform: translateY(0) scale(1);
вҖҸ    opacity:1;
  }
}

вҖҸ/* -------- floating hearts -------- */
вҖҸ.float-heart{
вҖҸ  position:fixed;
вҖҸ  font-size:22px;

}

вҖҸ@keyframes floatUp{
вҖҸ  from{transform:translateY(0); opacity:1;}
вҖҸ  to{transform:translateY(-800px); opacity:0;}
}
вҖҸ</style>
вҖҸ</head>

вҖҸ<body>

вҖҸ<!-- рҹ”Ҡ Sounds -->
вҖҸ<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
вҖҸ<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

вҖҸ<!-- рҹ§  Math Game -->
вҖҸ<div id="mathBox">
вҖҸ  <div id="question"></div>
вҖҸ  <input id="answer" type="number" placeholder="Your answer">
вҖҸ  <br>
вҖҸ  <button id="checkBtn">Check</button>
вҖҸ  <div id="msg"></div>
вҖҸ</div>

вҖҸ<!-- вқӨпёҸ Hearts Game -->
вҖҸ<div id="topText">PRESS TO WIN</div>
вҖҸ<p id="score">0 / 6</p>
вҖҸ<div id="game"></div>

вҖҸ<!-- рҹ’Ң Message -->
вҖҸ<div id="messageBox">
вҖҸ  <div id="text"></div>
вҖҸ  <img src="https://i.imgur.com/eOEcQSV.jpeg" class="win-image">
вҖҸ</div>

вҖҸ<!-- рҹ–јпёҸ Popup Image -->
вҖҸ<div id="imgOverlay">
вҖҸ  <img src="https://i.imgur.com/ScJQhwO.jpg" class="popup-img">
вҖҸ</div>

вҖҸ<script>

вҖҸ/* -------- MATH GAME -------- */
вҖҸlet step = 0;

вҖҸlet questions = [
вҖҸ  {q:"2 + 5 = ?", a:7},
вҖҸ  {q:"7 + 10 - 3 + 16 - 5 = ?", a:25}
];

вҖҸfunction loadQ(){
вҖҸ  document.getElementById("question").innerText = questions[step].q;
вҖҸ  document.getElementById("answer").value = "";
вҖҸ  document.getElementById("msg").innerText = "";
}

вҖҸloadQ();

вҖҸdocument.getElementById("checkBtn").onclick = function(){
вҖҸ  let val = Number(document.getElementById("answer").value);

вҖҸ  if(val === questions[step].a){
вҖҸ    document.getElementById("correctSound").play();
вҖҸ    document.getElementById("msg").innerText = "вң”пёҸ Correct!";
вҖҸ    burstHearts();

вҖҸ    step++;

вҖҸ    setTimeout(()=>{
вҖҸ      if(step < questions.length){
вҖҸ        loadQ();
вҖҸ      } else {
вҖҸ        document.getElementById("mathBox").style.display = "none";
вҖҸ        startHearts();
      }
    }, 800);

вҖҸ  } else {
вҖҸ    document.getElementById("wrongSound").play();
вҖҸ    document.getElementById("msg").innerText = "вқҢ Try again";
  }
};

вҖҸ/* рҹ’Ҙ burst hearts */
вҖҸfunction burstHearts(){
вҖҸ  for(let i=0;i<12;i++){
вҖҸ    let h = document.createElement("div");
вҖҸ    h.innerHTML = "рҹ’—";
вҖҸ    h.style.position = "fixed";
вҖҸ    h.style.left = Math.random()*100 + "vw";
вҖҸ    h.style.top = "50%";
вҖҸ    h.style.fontSize = "22px";
вҖҸ    h.style.animation = "floatUp 1.5s ease forwards";

вҖҸ    document.body.appendChild(h);
вҖҸ    setTimeout(()=>h.remove(),1500);
  }
}

вҖҸ/* -------- HEART GAME -------- */

вҖҸlet score = 0;
вҖҸlet target = 6;

вҖҸfunction startHearts(){

вҖҸdocument.getElementById("topText").style.display="block";
вҖҸdocument.getElementById("score").style.display="block";

вҖҸlet game = document.getElementById("game");
вҖҸlet scoreText = document.getElementById("score");

вҖҸfunction createHeart(){
вҖҸ  let heart = document.createElement("div");
вҖҸ  heart.className = "heart";

вҖҸ  let arr = ["рҹ©·","рҹ©ө"];
вҖҸ  heart.innerHTML = arr[Math.floor(Math.random()*arr.length)];

вҖҸ  heart.onclick = function(){
вҖҸ    score++;
вҖҸ    scoreText.innerText = score + " / " + target;
вҖҸ    heart.remove();

вҖҸ    let float = document.createElement("div");
вҖҸ    float.className = "float-heart";
вҖҸ    float.innerHTML = heart.innerHTML;
вҖҸ    float.style.left = Math.random()*100 + "vw";
вҖҸ    document.body.appendChild(float);

вҖҸ    setTimeout(()=>float.remove(),3000);

вҖҸ    if(score === target){
вҖҸ      showMessage();
    }
  };

вҖҸ  game.appendChild(heart);
}

вҖҸfor(let i=0;i<target;i++){
вҖҸ  createHeart();
}

}

вҖҸ/* -------- MESSAGE -------- */

вҖҸfunction showMessage(){

вҖҸdocument.getElementById("game").style.display="none";
вҖҸdocument.getElementById("topText").style.display="none";
вҖҸdocument.getElementById("score").style.display="none";

вҖҸdocument.getElementById("messageBox").style.display="block";

вҖҸрҹҳҪрҹ’•рҹ’•let line1 = "GREAT JOB MY SWEETIE BOY";
вҖҸlet rest = `I LOVE YOU 25,0000000000000вҷҫпёҸ!

вҖҸI'm proud of you, even for the small things

вҖҸYou mean more to me than anything.`;

вҖҸlet box = document.getElementById("text");
вҖҸbox.innerHTML = line1;

вҖҸsetTimeout(()=>{
вҖҸ  box.innerHTML = line1 + "\n\n" + rest;

  // рҹ–јпёҸ Ш§Щ„ШөЩҲШұШ© Ш§Щ„Ш«Ш§ЩҶЩҠШ© ШЁШ№ШҜ 4 Ш«ЩҲШ§ЩҶЩҠ
вҖҸ  setTimeout(()=>{
вҖҸ    document.getElementById("imgOverlay").style.display = "flex";
  }, 4000);

}, 700);

}

вҖҸ</script>

вҖҸ</body>
вҖҸ</html>
